<main class="page" *ngIf="settings$ | async as settings">
  <section class="card">
    <h1>设置</h1>
    <p>配置 API、模型、代理、上下文压缩、成本上限与主题。所有设置自动持久化到 localStorage。</p>
  </section>

  <form class="card form" [formGroup]="form" (ngSubmit)="save()">
    <h2>API / 模型</h2>

    <label>
      <span>API Key</span>
      <input type="password" formControlName="apiKey" placeholder="sk-..." />
    </label>

    <label>
      <span>模型选择</span>
      <select formControlName="model">
        <option value="claude-3-5-sonnet-latest">Claude 3.5 Sonnet</option>
        <option value="claude-3-7-sonnet-latest">Claude 3.7 Sonnet</option>
        <option value="claude-3-opus-latest">Claude 3 Opus</option>
      </select>
    </label>

    <h2>代理配置</h2>

    <label class="check">
      <input type="checkbox" formControlName="proxyEnabled" />
      <span>启用代理</span>
    </label>

    <label>
      <span>代理地址</span>
      <input type="text" formControlName="proxyBaseUrl" placeholder="https://proxy.example.com" />
    </label>

    <label>
      <span>代理 Token</span>
      <input type="password" formControlName="proxyAuthToken" placeholder="token" />
    </label>

    <h2>上下文压缩策略</h2>

    <label class="check">
      <input type="checkbox" formControlName="compressionEnabled" />
      <span>启用自动压缩</span>
    </label>

    <div class="inline">
      <label>
        <span>触发阈值（消息条数）</span>
        <input type="number" formControlName="maxMessagesBeforeCompact" />
      </label>

      <label>
        <span>压缩后保留条数</span>
        <input type="number" formControlName="compactToMessages" />
      </label>
    </div>

    <h2>成本上限</h2>

    <div class="inline">
      <label>
        <span>会话成本上限（USD）</span>
        <input type="number" step="0.1" formControlName="maxSessionCostUsd" />
      </label>

      <label>
        <span>预警阈值（USD）</span>
        <input type="number" step="0.1" formControlName="warnThresholdUsd" />
      </label>
    </div>

    <h2>主题</h2>

    <label>
      <span>主题切换</span>
      <select formControlName="theme">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </label>

    <div class="actions">
      <button type="submit">保存设置</button>
      <button type="button" class="secondary" (click)="reset()">恢复默认</button>
    </div>
  </form>

  <section class="card preview">
    <h2>当前生效配置（预览）</h2>
    <pre>{{ settings | json }}</pre>
  </section>
</main>
