<div class="multi-agent-sidebar" [class.collapsed]="collapsed()" [class.hidden]="!visible()">
  <div class="sidebar-content" *ngIf="!collapsed()">
    <div class="agents-display-grid" *ngIf="agents().length > 0; else emptyAgents">
      <div class="agent-display-card" *ngFor="let agent of agents(); trackBy: trackByAgentId">
        <div class="agent-icon-wrapper" [class.running]="agent.status === 'running' || agent.status === 'thinking'" [class.idle]="agent.status === 'idle'">
          <span nz-icon [nzType]="getRoleIcon(agent.role)" nzTheme="outline"></span>
        </div>
        <div class="agent-info-wrapper">
          <div class="agent-name-text">{{ agent.agentName }}</div>
          <div class="agent-status-text" [class.running]="agent.status === 'running' || agent.status === 'thinking'" [class.idle]="agent.status === 'idle'">
            {{ getAgentStatusText(agent.status) }}
          </div>
        </div>
      </div>
    </div>
    <ng-template #emptyAgents>
      <div class="empty-section">等待输入任务后自动分解</div>
    </ng-template>

    <div class="task-timeline-section" *ngIf="taskNodes().length > 0">
      <div class="timeline-header">
        <span class="timeline-title">任务清单</span>
        <span class="timeline-count">{{ completedTaskCount() }}/{{ taskNodes().length }}</span>
      </div>
      <div class="timeline-body">
        <div class="timeline-item" *ngFor="let task of taskNodes(); trackBy: trackByTaskId; let last = last"
          [class.completed]="task.status === 'completed'"
          [class.running]="task.status === 'running'"
          [class.failed]="task.status === 'failed'"
          [class.pending]="task.status === 'pending'">
          <div class="timeline-rail">
            <span class="timeline-dot">
              <span *ngIf="task.status === 'completed'" class="dot-check" nz-icon nzType="check" nzTheme="fill"></span>
              <span *ngIf="task.status === 'running'" class="dot-spinner" nz-icon nzType="loading" nzTheme="outline" nzSpin></span>
              <span *ngIf="task.status === 'failed'" class="dot-fail" nz-icon nzType="close" nzTheme="outline"></span>
              <span *ngIf="task.status === 'pending'" class="dot-wait"></span>
            </span>
            <span *ngIf="!last" class="timeline-line"></span>
          </div>
          <div class="timeline-content">
            <span class="timeline-task-title">{{ task.title }}</span>
            <span *ngIf="task.status === 'running' && task.currentStep" class="timeline-step">{{ task.currentStep }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
